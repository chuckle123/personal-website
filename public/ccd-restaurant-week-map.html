                html: `<div class="custom-marker ${premium ? 'premium' : ''}">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/>
                    </svg>
                </div>`,
                iconSize: [32, 32],
                iconAnchor: [16, 32],
                popupAnchor: [0, -32]
            });
        }

        // Add markers for each restaurant
        restaurants.forEach(restaurant => {
            const marker = L.marker([restaurant.lat, restaurant.lng], {
                icon: createCustomIcon(restaurant.premium)
            }).addTo(map);

            const priceText = restaurant.premium ? '$60' : '$45';
            const premiumBadge = restaurant.premium ? '<span class="premium-badge">PREMIUM</span>' : '';

            const popupContent = `
                <div class="popup-content">
                    <div class="popup-header">
                        <h3>${restaurant.name}</h3>
                        ${premiumBadge}
                    </div>
                    <div class="address">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                        <span>${restaurant.address}</span>
                    </div>
                    <div class="phone">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                        </svg>
                        <span>${restaurant.phone}</span>
                    </div>
                    <div class="price-tag">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="1" x2="12" y2="23"></line>
                            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                        </svg>
                        ${priceText} Prix Fixe Dinner
                    </div>
                    <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(restaurant.name + ' ' + restaurant.address)}" target="_blank" class="btn-reserve">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                        Get Directions
                    </a>
                </div>
            `;

            marker.bindPopup(popupContent, {
                maxWidth: 320,
                closeButton: true
            });

            // Add permanent label above marker
            marker.bindTooltip(restaurant.name, {
                permanent: true,
                direction: 'top',
                offset: [0, -35],
                className: 'restaurant-label' + (restaurant.premium ? ' premium-label' : '')
            });
        });

        }); // End of window load event listener
    </script>
</body>
</html>
